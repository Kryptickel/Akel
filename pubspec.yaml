name: akel
description: Comprehensive panic button safety app for emergency situations
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core dependencies
  cupertino_icons: ^1.0.6
  
  # State management
  provider: ^6.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^12.1.3
  
  # UI/UX
  flutter_staggered_animations: ^1.1.1
  lottie: ^2.7.0
  flutter_animate: ^4.2.0
  
  # Location & Maps
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  google_maps_flutter: ^2.5.0
  location: ^5.0.3
  
  # Camera & Media
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  video_player: ^2.8.1
  audioplayers: ^5.2.1
  record: ^5.0.4
  
  # Storage & Backend
  cloud_firestore: ^4.13.6
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  firebase_storage: ^11.5.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Networking
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  
  # Device capabilities
  device_info_plus: ^9.1.1
  permission_handler: ^11.1.0
  local_auth: ^2.1.7
  vibration: ^1.8.4
  torch_light: ^1.0.0
  
  # Security
  crypto: ^3.0.3
  encrypt: ^5.0.3
  
  # Communication
  url_launcher: ^6.2.2
  share_plus: ^7.2.2
  
  # Background tasks
  workmanager: ^0.5.1
  flutter_background_service: ^5.0.5
  
  # Development utilities
  logger: ^2.0.2+1
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700