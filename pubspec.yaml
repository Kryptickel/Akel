name: akel
description: Enterprise Emergency Response System with Advanced Safety Features
publish_to: none
version: 1.0.0+55

environment:
  sdk: '>=3.5.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  arcore_flutter_plugin: ^0.10.0

  # ==================== CORE FIREBASE ====================
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0

  # ==================== STATE MANAGEMENT ====================
  provider: ^6.1.5+1
  riverpod: ^2.4.9

  # ==================== UI & CHARTS ====================
  fl_chart: ^1.2.0
  cupertino_icons: ^1.0.8
  avatar_glow: ^3.0.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1
  flutter_animate: ^4.3.0
  flutter_staggered_animations: ^1.1.1
  syncfusion_flutter_charts: ^33.1.45

  # ==================== LOCATION & MAPS ====================
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter: ^2.14.0
  google_maps_flutter_web: ^0.6.2
  flutter_polyline_points: ^3.1.0
  google_ml_kit: ^0.21.0
  permission_handler: ^12.0.1
  go_router: ^17.1.0
  location: ^8.0.1

  # ==================== SECURITY & AUTHENTICATION ====================
  google_sign_in: ^7.2.0
  local_auth: ^3.0.0
  flutter_secure_storage: ^10.0.0
  encrypt: ^5.0.3
  crypto: ^3.0.3

  # ==================== NETWORKING ====================
  http: ^1.6.0
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2
  flutter_bluetooth_serial: ^0.4.0
  flutter_blue_plus: ^2.2.1
  dio: ^5.4.0
  flutter_phone_direct_caller: ^2.1.1
  contacts_service: ^0.6.3


  # ==================== SENSORS & HARDWARE ====================
  sensors_plus: ^7.0.0
  battery_plus: ^7.0.0
  vibration: ^3.1.5
  torch_light: ^1.0.1

  # ==================== AUDIO & VOICE ====================
  audioplayers: ^6.5.1
  just_audio: ^0.10.5
  flutter_sound: ^9.4.11
  flutter_tts: ^4.2.5
  speech_to_text: ^7.0.0
  record: ^6.2.0
  translator: ^1.0.0

  # ==================== STORAGE & DATABASE ====================
  shared_preferences: ^2.5.4
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ==================== IMAGES & CAMERA ====================
  image_picker: ^1.0.7
  image: ^4.1.2
  camera: ^0.12.0+1
  video_player: ^2.9.2
  photo_view: ^0.15.0

  # ==================== NOTIFICATIONS ====================
  flutter_local_notifications: ^21.0.0
  home_widget: ^0.9.0
  timezone: ^0.11.0
  workmanager: ^0.9.0+3

  # ==================== UTILITIES ====================
  intl: ^0.20.2
  uuid: ^4.5.2
  share_plus: ^12.0.1
  package_info_plus: ^9.0.0
  logger: ^2.0.2+1
  app_settings: ^7.0.0
  device_info_plus: ^12.3.0
  flutter_dotenv: ^6.0.0
  worker_manager: ^7.2.7
  flutter_background_service: ^5.0.5

  # ==================== FILE HANDLING ====================
  csv: ^8.0.0
  file_picker: ^10.3.10
  open_file: ^3.5.8
  path_provider: ^2.1.5

  # ==================== DOCUMENTS ====================
  pdf: ^3.11.1
  printing: ^5.13.4
  open_filex: ^4.3.4

  # ==================== WIDGETS & UI ENHANCEMENTS ====================
  flutter_slidable: ^4.0.3
  animations: ^2.0.11
  lottie: ^3.1.3
  flutter_svg: ^2.0.10
  rive: ^0.14.4

  # ==================== WEB VIEW ====================
  webview_flutter: ^4.10.0


  # ==================== QR CODE ====================
  qr_flutter: ^4.1.0
  qr_code_scanner: ^1.0.1

  flutter_sms: ^3.0.1

  cached_network_image: ^3.4.1
  universal_html: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  build_runner: ^2.4.7
  hive_generator: ^2.0.1

# ==================== LAUNCHER ICONS ====================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0A0E27"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

# ==================== FLUTTER CONFIG ====================
flutter:
  uses-material-design: true
  generate: true

  # ==================== ASSETS ====================
  assets:
    - .env
    # Sounds
    - assets/sounds/warning.wav
    - assets/sounds/warnings.wav
    - assets/sounds/emergency.wav
    - assets/sounds/success.wav
    - assets/sounds/countdown.wav
    - assets/sounds/critical.wav

    # Images
    - assets/images/
    - assets/icon/

    # Animations (if any)
    - assets/animations/
    - assets/onboarding/
    - assets/onboarding/onboarding_1.png
    - assets/onboarding/onboarding_2.png
    - assets/onboarding/onboarding_3.png
    - assets/onboarding/onboarding_4.png
    - assets/onboarding/onboarding_5.png
    - assets/onboarding/onboarding_6.png


  # ==================== FONTS ====================
  fonts:
    # Dyslexia-friendly fonts
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/opendyslexic-regular.otf
        - asset: assets/fonts/opendyslexic-Bold.otf
          weight: 700
        - asset: assets/fonts/opendyslexic-italic.otf
          style: italic

    - family: Lexend
      fonts:
        - asset: assets/fonts/lexend-regular.ttf
        - asset: assets/fonts/lexend-bold.ttf
          weight: 700
        - asset: assets/fonts/lexend-semibold.ttf
          weight: 600
